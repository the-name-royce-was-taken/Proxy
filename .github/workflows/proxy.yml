name: Chisel Proxy Setup

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Copy Chisel .deb Package
        run: |
          cp chisel_1.11.5_linux_386.deb chisel.deb
          sudo dpkg -i chisel.deb

      - name: Copy Checksums
        run: |
          cp Proxy/chisel_1.11.5_checksums.txt checksums.txt

      - name: Verify Chisel Binary
        run: |
          echo "$(grep chisel_1.11.5_linux_386.deb checksums.txt)  chisel.deb" | sha256sum -c -

      - name: Start Chisel Server
        run: |
          chisel server --reverse --port 8080 &

      - name: Run Chisel Client
        run: |
          chisel client --proxy socks5://localhost:1080 10.0.0.1:9090 R:socks
