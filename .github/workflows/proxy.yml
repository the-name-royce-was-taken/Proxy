name: SOCKS5 Proxy

on:
  workflow_dispatch:
    inputs:
      time-duration:
        description: Time to run the proxy
        required: true
        default: 10m

jobs:
  socks5-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Chisel
        run: |
          curl -L 
          https://github.com/jpillora/chisel/releases/download/v1.11.5/chisel_v1.11.5_linux_amd64.tar.gz -o chisel.tar.gz

      - name: Run Chisel SOCKS5 Proxy
        run: |
          timeout "${{ github.event.inputs.time-duration }}" chisel server --socks5
