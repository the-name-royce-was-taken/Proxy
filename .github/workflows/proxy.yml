name: Chisel Proxy Setup

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Download Chisel
        run: |
          curl -L https://github.com/jpillora/chisel/releases/latest/download/chisel_linux_amd64.gz -o chisel.gz
          gunzip chisel.gz
          chmod +x chisel
          sudo mv chisel /usr/local/bin/

      - name: Start Chisel Server
        run: |
          chisel server --reverse --port 8080 &

      - name: Run Chisel Client
        run: |
          chisel client --proxy socks5://localhost:1080 10.0.0.1:9090 R:socks
